name: Build OpenClash IPK

# 触发条件：手动触发，或者在代码同步完成后自动触发
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Auto Sync OpenClash & AnGe-ClashBoard"]
    types:
      - completed

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gawk gettext git libncurses5-dev libssl-dev python3 unzip wget zlib1g-dev

      - name: Download OpenWrt SDK
        run: |
          echo "下载 OpenWrt SDK..."
          # 使用官方 SDK 编译（OpenClash 插件不区分 CPU 架构，用 x86 SDK 编译出来的包适用于所有路由器）
          wget -q https://downloads.openwrt.org/releases/23.05.3/targets/x86/64/openwrt-sdk-23.05.3-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          tar Jxf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* sdk

      - name: Compile OpenClash IPK
        run: |
          echo "准备编译环境..."
          cp -r luci-app-openclash sdk/package/
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          
          echo "开始编译 OpenClash..."
          # 只编译 OpenClash 插件
          make package/luci-app-openclash/compile V=s

      - name: Upload IPK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenClash-AnGe-IPK
          path: sdk/bin/packages/*/base/luci-app-openclash*.ipk
