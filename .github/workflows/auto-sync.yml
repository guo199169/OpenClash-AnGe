name: Auto Sync OpenClash & AnGe-ClashBoard

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 这里调用我们刚刚配置的高级令牌，解决权限不足的问题
          token: ${{ secrets.SYNC_TOKEN }} 

      - name: Sync and Integrate
        run: |
          set -e

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          echo "=> 1. 获取 OpenClash 最新源码并合并..."
          git remote add upstream https://github.com/vernesong/openclash.git || true
          git fetch upstream master
          
          # 改用 merge 合并代码，这样既能拿到官方最新代码，又不会删掉我们自己的脚本
          git merge upstream/master -m "Auto-merge upstream OpenClash" --allow-unrelated-histories || true

          echo "=> 2. 创建面板存放目录..."
          PANEL_DIR="luci-app-openclash/root/usr/share/openclash/ui/ange"
          mkdir -p "$PANEL_DIR"

          echo "=> 3. 拉取 AnGe-ClashBoard 最新源码..."
          git clone --depth 1 https://github.com/liandu2024/AnGe-ClashBoard.git ange_temp
          if [ -d "ange_temp/dist" ]; then
            cp -r ange_temp/dist/* "$PANEL_DIR/"
          else
            rsync -av --exclude='.git' ange_temp/ "$PANEL_DIR/"
          fi
          rm -rf ange_temp

          echo "=> 4. 提交并推送..."
          git add .
          
          # 无论是否有变更都执行提交（如果没有变更 commit 会失败，加 || true 忽略）
          git commit -m "Auto-sync: 整合 OpenClash 与 AnGe-ClashBoard ($(date +'%Y-%m-%d'))" || true
          
          # 推送到当前分支
          git push origin HEAD
          echo "✅ 同步与整合完毕，代码已推送到仓库！"
